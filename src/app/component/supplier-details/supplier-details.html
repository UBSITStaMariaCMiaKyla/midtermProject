<div class="container">
    <h2>Supplier Details</h2>
  
    @if (supplier) {
      <div class="form-card">
  
        <div class="form-group">
          <label>ID</label>
          <input type="number" [(ngModel)]="supplier.id" name="id" readonly />
        </div>
  
        <div class="form-group">
          <label>Supplier Name</label>
          <input type="text" [(ngModel)]="supplier.supplierName" name="supplierName" />
        </div>
  
        <div class="form-group">
          <label>Location</label>
          <input type="text" [(ngModel)]="supplier.location" name="location" />
        </div>
  
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="supplier.email" name="email" />
        </div>
  
        <div class="form-group">
          <label>Contact Person</label>
          <input type="text" [(ngModel)]="supplier.contactPerson" name="contactPerson" />
        </div>
  
        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="supplier.phone" name="phone" />
        </div>
  
        <div class="form-group">
          <label>Category</label>
          <input type="text" [(ngModel)]="supplier.category" name="category" />
        </div>
  
        <div class="form-group">
          <label>Products Supplied</label>
          <textarea [(ngModel)]="supplier.productsSupplied" name="productsSupplied" rows="3"></textarea>
        </div>
  
        <div class="btn-group">
          <button class="btn-save" (click)="saveChanges()">Save</button>
          <button class="btn-back" (click)="goBack()">Back</button>
        </div>
  
      </div>
    } @else {
      <p>Supplier not found.</p>
      <button class="btn-back" (click)="goBack()">Back to List</button>
    }
  </div>
