<div class="container">
    <h2>Suppliers Management</h2>
  
    <!-- Search box to filter suppliers by name -->
    <input
      class="search-box"
      (input)="onSearch($event)"
      placeholder="Search supplier name..." />
  
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Supplier Name</th>
          <th>Contact Person</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Loop through each supplier and display as a table row -->
        @for (supplier of suppliers(); track supplier.id) {
          <tr>
            <td>{{ supplier.id }}</td>
            <td>{{ supplier.supplierName }}</td>
            <td>{{ supplier.contactPerson }}</td>
            <td class="action-btns">
              <button class="btn-view" (click)="viewSupplierDetails(supplier.id)">View</button>
              <button class="btn-delete" (click)="confirmDelete(supplier.id)">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  
  <!-- Custom Delete Confirmation Modal -->
  @if (showModal()) {
    <div class="modal-overlay">
      <div class="modal-box">
        <h3>Delete Supplier</h3>
        <p>Are you sure you want to delete this supplier?</p>
        <div class="modal-btns">
          <button class="btn-confirm-delete" (click)="onDelete()">Yes, Delete</button>
          <button class="btn-cancel" (click)="cancelDelete()">Cancel</button>
        </div>
      </div>
    </div>
  }
